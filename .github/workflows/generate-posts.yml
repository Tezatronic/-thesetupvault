name: Generate SEO Blog Post

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-post.mjs

      - name: Commit and push new post
        run: |
          git config user.name "setup-vault-bot"
          git config user.email "setup-vault-bot@users.noreply.github.com"
          git add src/content/blog scripts/used-angles.json
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: auto-generate blog post"
          git diff --staged --quiet || git push
